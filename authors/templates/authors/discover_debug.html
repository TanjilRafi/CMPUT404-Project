<!DOCTYPE html>
<html>
<head>
    <title>Debug Remote Authors</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        ul { list-style-type: none; padding-left: 0; }
        li { padding: 5px 0; }
        .node { font-weight: bold; margin-top: 15px; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Debug Remote Authors</h1>

    {% for node in nodes %}
        <div class="node">Node: {{ node.url }}</div>
    {% endfor %}

    <h2>Fetched Authors:</h2>
    {% if remote_authors %}
        <ul>
        {% for author in remote_authors %}
            <li>{{ author.displayName }} — ID: {{ author.id }}</li>
        {% endfor %}
        </ul>
    {% else %}
        <p class="error">No authors fetched from remote nodes.</p>
    {% endif %}
</body>
</html>
