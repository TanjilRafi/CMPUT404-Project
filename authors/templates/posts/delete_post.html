{% extends "base.html" %}
{% block title %}
Delete Post
{%endblock%}

{% block page %}
<div class="main-content">
    <h1>Delete Post</h1>

    <p>Are you sure you want to delete "{{ post.title }}"?</p>

    <form method="post">
        {% csrf_token %}
        <input type="submit" value="Confirm Delete">
        <a class="link-as-button" href="{% url 'post_detail' author.id post.id%}">Cancel</a>
    </form>
</div>
{%endblock%}
